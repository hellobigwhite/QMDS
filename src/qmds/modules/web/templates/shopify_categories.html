{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:800px;margin:0 auto;">
    <h2>🔍 筛选精准类目</h2>
    <p class="text-muted" style="margin-bottom:16px;">
        从对应类目的 unfiltered 集合中读取店铺 URL → 请求 /collections.json → 用类目关键词精确匹配 → 保存匹配结果到 filtered 集合
    </p>

    <form method="post" action="/shopify/filter-categories">
        <div class="form-group">
            <label for="category">选择类目</label>
            <select id="category" name="category" required>
                <option value="">-- 请选择类目 --</option>
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">开始筛选</button>
    </form>
</div>
{% endblock %}
