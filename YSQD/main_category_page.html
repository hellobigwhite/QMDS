 

<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>This is a page for setting main category</title>
	<link href="//unpkg.com/layui@2.13.2/dist/css/layui.css" rel="stylesheet">
</head>
<body>
<div class="layui-container">
	<div class="layui-row">
		<form class="layui-form layui-row layui-col-space16">
			<div class="layui-col-md4">
				<div class="layui-input-wrap">
					<div class="layui-input-prefix">
						<i class="layui-icon layui-icon-username"></i>
					</div>
					<input type="text" name="category_name" value="" placeholder="请输入分类名或完整路径，如 Parent|||Child" class="layui-input"
						   lay-affix="clear">
				</div>
			</div>
			<div class="layui-btn-container layui-col-xs12">
				<button class="layui-btn" lay-submit lay-filter="demo-table-search">Search</button>
				<button type="reset" class="layui-btn layui-btn-primary">Clear</button>
			</div>
		</form>
		<hr style="margin-top: 5px; margin-bottom: 5px">
		<p>上传的分类不能有<span style="color: red"><strong>simple</strong></span>分类</p>
		<p>支持按分类名或完整路径搜索，遇到同名分类时建议使用 <strong>Parent|||Child</strong>。</p>
		<p>当前的主分类为：<strong></strong></p>

		<table class="layui-hide" id="ID-table-demo-search" lay-filter="mainTableTool"></table>
	</div>
</div>

<script type="text/html" id="mainToolbar">
	<a class="layui-btn layui-btn-bs layui-btn-normal" lay-event="main">设为主分类</a>
</script>

<!-- 请勿在项目正式环境中引用该 layui.js 地址 -->
<script src="//unpkg.com/layui@2.13.2/dist/layui.js"></script>
<script>
	layui.use(function () {
		var table = layui.table;
		var form = layui.form;
		var admin = layui.admin;
		var $ = layui.$;
		// 创建表格实例
		table.render({
			elem: '#ID-table-demo-search'
			, url: './categorySearch.php' // 此处为静态模拟数据，实际使用时需换成真实接口
			, method: 'post'
			, page: true
			, limit: 100
			, limits: [100, 200, 500]
			, where: {show_hidden: 1, include_full_path: 1}
			, cols: [[
				{align: 'center', toolbar: '#mainToolbar', width: 200},
				{field: 'term_id', title: '分类id', width: 100},
				{field: 'term_name', title: '分类名', width: 170},
				{field: 'parent_id', title: '父级id', width: 100},
				{field: 'is_main', title: '是否主菜单', width: 100},
				{field: 'slug', title: 'slug'}
			]],
		});

		// 搜索提交
		form.on('submit(demo-table-search)', function (data) {
			var field = data.field; // 获得表单字段
			// 执行搜索重载
			table.reload('ID-table-demo-search', {
				page: {
					curr: 1 // 重新从第 1 页开始
				},
				where: Object.assign({}, field, {show_hidden: 1, include_full_path: 1}) // 搜索的字段
			});

			return false; // 阻止默认 form 跳转
		});

		table.on('tool(mainTableTool)', function (obj) {
			var data = obj.data;
			//修改
			if (obj.event === 'main') {

				layer.confirm('您确认想要设置为主分类么 <span class="c-green">' + data.term_name + '</span> 吗？', function (index) {

					$.ajax({
						url: './mainCategorySet.php'
						, data: {term_id: data.term_id}
						, type: 'post'
						, success: function (result) {
							result = JSON.parse(result);
							if (result.error) {
								layer.alert(result.msg.join('<br>'), {icon: 5});
							} else {
								layer.msg(result.msg.join('<br>'));
								window.location.reload();
							}
						}
						, error: function () {

						}
					});
				});
			}
		});
	});
</script>

</body>
</html>
